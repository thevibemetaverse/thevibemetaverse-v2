<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vibe Metaverse v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #hud-left {
      position: fixed; top: 20px; left: 20px;
      display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
      z-index: 10; pointer-events: none;
    }
    #hud {
      position: fixed; top: 20px; right: 20px;
      z-index: 10; pointer-events: none;
    }
    #hud-pips {
      display: flex; gap: 6px;
    }
    .pip {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.9);
      transition: background 0.3s, border-color 0.3s;
    }
    .pip.used {
      background: transparent;
      border-color: rgba(255,255,255,0.4);
    }
    #tab-hint {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    #github-link {
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.9);
      opacity: 0.9;
      transition: opacity 0.2s, color 0.2s;
      pointer-events: auto;
    }
    #github-link:hover {
      opacity: 1;
      color: #fff;
    }
    #github-link svg {
      width: 26px; height: 26px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    }

    #prompt-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: none; align-items: center;
      padding: 12px 20px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      z-index: 20;
    }
    #prompt-bar.visible { display: flex; }
    #prompt-label {
      color: rgba(255,255,255,0.6); font-size: 14px; margin-right: 12px;
      white-space: nowrap;
    }
    #prompt-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-size: 16px; font-family: 'Courier New', monospace;
    }
    #prompt-input::placeholder { color: rgba(255,255,255,0.35); }

    #materializing {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: none;
      color: #fff; font-size: 20px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      z-index: 20; pointer-events: none;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #materializing.visible { display: block; }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    #error-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      display: none; padding: 10px 20px;
      background: rgba(200,50,50,0.8); color: #fff; border-radius: 6px;
      font-size: 14px; z-index: 25; pointer-events: none;
    }
    #error-toast.visible { display: block; }
  </style>
</head>
<body>
  <div id="hud-left">
    <div id="hud-pips"></div>
    <div id="tab-hint">TAB to create</div>
  </div>
  <div id="hud">
    <a id="github-link" href="https://github.com/thevibemetaverse/thevibemetaverse-v2" target="_blank" rel="noopener noreferrer" aria-label="The Vibe Metaverse v2 on GitHub">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
      </svg>
    </a>
  </div>
  <div id="prompt-bar">
    <span id="prompt-label">create &gt;</span>
    <input id="prompt-input" type="text" placeholder="Describe an object..." autocomplete="off" />
  </div>
  <div id="materializing">Materializing...</div>
  <div id="error-toast"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/",
      "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.3/build/index.module.js",
      "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.16/build/index.module.js",
      "@vibe/portals": "/vendor/portals/sdk/index.js"
    }
  }
  </script>
  <script type="module">
    import { init } from './modules/game.js';
    init();
  </script>
</body>
</html>
