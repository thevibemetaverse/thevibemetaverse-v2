<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vibe Metaverse v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 20px; right: 20px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
      z-index: 10; pointer-events: none;
    }
    #hud-pips {
      display: flex; gap: 6px;
    }
    .pip {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.9);
      transition: background 0.3s, border-color 0.3s;
    }
    .pip.used {
      background: transparent;
      border-color: rgba(255,255,255,0.4);
    }
    #tab-hint {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    #prompt-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: none; align-items: center;
      padding: 12px 20px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      z-index: 20;
    }
    #prompt-bar.visible { display: flex; }
    #prompt-label {
      color: rgba(255,255,255,0.6); font-size: 14px; margin-right: 12px;
      white-space: nowrap;
    }
    #prompt-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-size: 16px; font-family: 'Courier New', monospace;
    }
    #prompt-input::placeholder { color: rgba(255,255,255,0.35); }

    #materializing {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: none;
      color: #fff; font-size: 20px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      z-index: 20; pointer-events: none;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #materializing.visible { display: block; }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    #error-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      display: none; padding: 10px 20px;
      background: rgba(200,50,50,0.8); color: #fff; border-radius: 6px;
      font-size: 14px; z-index: 25; pointer-events: none;
    }
    #error-toast.visible { display: block; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-pips"></div>
    <div id="tab-hint">TAB to create</div>
  </div>
  <div id="prompt-bar">
    <span id="prompt-label">create &gt;</span>
    <input id="prompt-input" type="text" placeholder="Describe an object..." autocomplete="off" />
  </div>
  <div id="materializing">Materializing...</div>
  <div id="error-toast"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/",
      "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.3/build/index.module.js",
      "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.16/build/index.module.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { Brush, Evaluator, SUBTRACTION, ADDITION, INTERSECTION } from 'three-bvh-csg';

    // ── Core state ──
    let scene, camera, renderer;
    let player;
    let playerModel;
    let animationMixer;
    let idleAnimAction;
    let runAnimAction;
    let lastMovingState = null;
    const clock = new THREE.Clock();

    const keys = {};
    let orbitAngle = 0;
    const orbitDistance = 14;
    const orbitHeight = 6;
    let isPointerDown = false;

    // ── Prompt World state ──
    let gameState = 'EXPLORING'; // EXPLORING | PROMPTING | GENERATING
    let promptsRemaining = 5;
    const occupiedCells = new Set();
    const placedObjects = [];

    // ── DOM refs ──
    const hudPips = document.getElementById('hud-pips');
    const tabHint = document.getElementById('tab-hint');
    const promptBar = document.getElementById('prompt-bar');
    const promptInput = document.getElementById('prompt-input');
    const materializingEl = document.getElementById('materializing');
    const errorToast = document.getElementById('error-toast');

    // Build pip elements
    for (let i = 0; i < 5; i++) {
      const pip = document.createElement('div');
      pip.className = 'pip';
      hudPips.appendChild(pip);
    }

    function updateHUD() {
      const pips = hudPips.querySelectorAll('.pip');
      pips.forEach((pip, i) => {
        pip.classList.toggle('used', i >= promptsRemaining);
      });
      tabHint.style.display = promptsRemaining > 0 ? 'block' : 'none';
    }

    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.classList.add('visible');
      setTimeout(() => errorToast.classList.remove('visible'), 3000);
    }

    // ── Prompt flow ──
    function openPrompt() {
      if (gameState !== 'EXPLORING' || promptsRemaining <= 0) return;
      gameState = 'PROMPTING';
      Object.keys(keys).forEach(k => keys[k] = false);
      setMovingAnimation(false);
      promptBar.classList.add('visible');
      promptInput.value = '';
      promptInput.focus();
      tabHint.style.display = 'none';
    }

    function closePrompt() {
      gameState = 'EXPLORING';
      promptBar.classList.remove('visible');
      promptInput.value = '';
      promptInput.blur();
      if (promptsRemaining > 0) tabHint.style.display = 'block';
    }

    async function submitPrompt() {
      const text = promptInput.value.trim();
      if (!text) return;

      gameState = 'GENERATING';
      promptBar.classList.remove('visible');
      materializingEl.classList.add('visible');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const { code } = await res.json();
        if (!code) throw new Error('No code returned');

        const group = executeGeneratedCode(code);
        if (!group) throw new Error('Code did not produce a valid object');

        placeGeneratedObject(group);
        promptsRemaining--;
        updateHUD();
      } catch (err) {
        console.error('Generation failed:', err);
        showError('Something went wrong — prompt not consumed');
      }

      materializingEl.classList.remove('visible');
      gameState = 'EXPLORING';
      if (promptsRemaining > 0) tabHint.style.display = 'block';
    }

    // ── CSG helper shared with generated code ──
    const CSG = { Brush, Evaluator, SUBTRACTION, ADDITION, INTERSECTION };

    // ── Code execution (sandboxed — THREE and CSG are accessible) ──
    function executeGeneratedCode(code) {
      try {
        const fn = new Function('THREE', 'CSG', code);
        const result = fn(THREE, CSG);
        if (result && result.isGroup) return result;
        // If they returned a mesh directly, wrap it
        if (result && result.isMesh) {
          const g = new THREE.Group();
          g.add(result);
          return g;
        }
        console.error('Generated code did not return a Group or Mesh');
        return null;
      } catch (e) {
        console.error('Generated code execution error:', e);
        return null;
      }
    }

    // ── Placement ──
    function placeGeneratedObject(group) {
      const facing = player.rotation.y;
      const baseX = Math.round(player.position.x + Math.sin(facing) * 8);
      const baseZ = Math.round(player.position.z + Math.cos(facing) * 8);

      // Enable shadows on all meshes
      group.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      // Compute bounding box to derive occupancy
      const box = new THREE.Box3().setFromObject(group);
      const size = box.getSize(new THREE.Vector3());

      // Build occupancy blocks from bounding box
      const blocks = [];
      const minX = Math.floor(box.min.x);
      const maxX = Math.ceil(box.max.x);
      const minZ = Math.floor(box.min.z);
      const maxZ = Math.ceil(box.max.z);
      for (let x = minX; x <= maxX; x++) {
        for (let z = minZ; z <= maxZ; z++) {
          blocks.push({ x, y: 0, z });
        }
      }

      // Find clear position using spiral search
      const canPlace = (ax, az) => {
        for (const b of blocks) {
          if (occupiedCells.has(`${ax + b.x},${b.y},${az + b.z}`)) return false;
        }
        return true;
      };

      let anchorX = baseX, anchorZ = baseZ;
      if (!canPlace(baseX, baseZ)) {
        outer:
        for (let r = 1; r <= 20; r++) {
          for (let dx = -r; dx <= r; dx++) {
            for (let dz = -r; dz <= r; dz++) {
              if (Math.abs(dx) !== r && Math.abs(dz) !== r) continue;
              if (canPlace(baseX + dx, baseZ + dz)) {
                anchorX = baseX + dx;
                anchorZ = baseZ + dz;
                break outer;
              }
            }
          }
        }
      }

      // Mark occupied
      for (const b of blocks) {
        occupiedCells.add(`${anchorX + b.x},${b.y},${anchorZ + b.z}`);
      }

      group.position.set(anchorX, 0, anchorZ);
      scene.add(group);
      placedObjects.push(group);
    }

    // ── Init ──
    function init() {
      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      document.body.appendChild(renderer.domElement);

      // Scene
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0xCCE8FF, 0.006);

      // Camera
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, orbitHeight, orbitDistance);

      createSky();
      createGround();
      createHills();
      createTrees();
      setupLighting();

      player = new THREE.Group();
      scene.add(player);

      setupPlayerControls();
      loadPlayerModel();
      updateHUD();

      window.addEventListener('resize', onResize);
      animate();
    }

    function setupPlayerControls() {
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Tab') {
          e.preventDefault();
          if (gameState === 'EXPLORING' && promptsRemaining > 0) openPrompt();
          return;
        }
        if (e.code === 'Escape') {
          if (gameState === 'PROMPTING') closePrompt();
          return;
        }
        if (gameState === 'EXPLORING') {
          keys[e.code] = true;
        }
      });
      window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
      });

      // Prompt input: Enter to submit
      promptInput.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.code === 'Enter') {
          e.preventDefault();
          submitPrompt();
        }
        if (e.code === 'Escape') {
          e.preventDefault();
          closePrompt();
        }
      });

      renderer.domElement.addEventListener('pointerdown', (e) => {
        if (e.button === 0 && gameState === 'EXPLORING') isPointerDown = true;
      });
      window.addEventListener('pointerup', () => {
        isPointerDown = false;
      });
      window.addEventListener('pointermove', (e) => {
        if (!isPointerDown) return;
        orbitAngle -= e.movementX * 0.006;
      });
    }

    function loadPlayerModel() {
      const loader = new GLTFLoader();
      loader.load(
        'assets/3d/metaverse-explorer.glb',
        (gltf) => {
          playerModel = gltf.scene;
          playerModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          const box = new THREE.Box3().setFromObject(playerModel);
          const size = box.getSize(new THREE.Vector3());
          const targetHeight = 2.2;
          const scale = targetHeight / Math.max(size.y, 0.001);
          playerModel.scale.setScalar(scale);

          box.setFromObject(playerModel);
          const center = new THREE.Vector3();
          box.getCenter(center);
          playerModel.position.set(-center.x, -box.min.y, -center.z);

          player.add(playerModel);

          setupCharacterAnimations(gltf);
        },
        undefined,
        (err) => {
          console.error('Failed to load character model:', err);
        }
      );
    }

    function resetSkinnedMeshesToBindPose(root) {
      if (!root) return;
      root.traverse((child) => {
        if (child.isSkinnedMesh && child.skeleton) {
          child.skeleton.pose();
        }
      });
    }

    function pickIdleAndRunClips(animations) {
      if (!animations.length) return { idle: null, run: null };
      const run =
        animations.find((c) => /run|sprint|jog/i.test(c.name)) ||
        animations.find((c) => /walk/i.test(c.name));
      const idle = animations.find((c) =>
        /idle|stand|breath|t-?pose/i.test(c.name)
      );
      if (idle && run) return { idle, run };
      if (animations.length >= 2) {
        return { idle: animations[0], run: animations[1] };
      }
      const only = animations[0];
      if (/idle|stand|breath/i.test(only.name)) {
        return { idle: only, run: null };
      }
      return { idle: null, run: only };
    }

    function setupCharacterAnimations(gltf) {
      const clips = gltf.animations;
      if (!clips.length) return;

      animationMixer = new THREE.AnimationMixer(playerModel);
      const { idle: idleClip, run: runClip } = pickIdleAndRunClips(clips);

      if (idleClip) idleAnimAction = animationMixer.clipAction(idleClip);
      if (runClip) runAnimAction = animationMixer.clipAction(runClip);

      if (idleAnimAction && runAnimAction) {
        idleAnimAction.play();
        runAnimAction.play();
        runAnimAction.setEffectiveWeight(0);
        lastMovingState = false;
      } else if (runAnimAction && !idleAnimAction) {
        runAnimAction.stop();
        resetSkinnedMeshesToBindPose(playerModel);
        lastMovingState = false;
      } else if (idleAnimAction) {
        idleAnimAction.play();
        lastMovingState = false;
      }
    }

    function setMovingAnimation(isMoving) {
      if (!animationMixer) return;

      if (idleAnimAction && runAnimAction) {
        if (lastMovingState === isMoving) return;
        const fade = 0.25;
        if (isMoving) {
          idleAnimAction.crossFadeTo(runAnimAction, fade, false);
        } else {
          runAnimAction.crossFadeTo(idleAnimAction, fade, false);
        }
        lastMovingState = isMoving;
        return;
      }

      if (runAnimAction && !idleAnimAction) {
        if (lastMovingState === isMoving) return;
        lastMovingState = isMoving;
        if (isMoving) {
          runAnimAction.reset();
          runAnimAction.play();
        } else {
          runAnimAction.stop();
          resetSkinnedMeshesToBindPose(playerModel);
        }
        return;
      }

      if (idleAnimAction && !runAnimAction) {
        lastMovingState = false;
      }
    }

    function updateCamera() {
      if (!player) return;
      const p = player.position;
      camera.position.set(
        p.x + Math.sin(orbitAngle) * orbitDistance,
        p.y + orbitHeight,
        p.z + Math.cos(orbitAngle) * orbitDistance
      );
      const lookY = playerModel ? 1.2 : 0.8;
      camera.lookAt(p.x, p.y + lookY, p.z);
    }

    function updatePlayer(delta) {
      if (!player) return;
      if (gameState !== 'EXPLORING') return;

      const speed = 14 * delta;
      const forward = new THREE.Vector3(
        -Math.sin(orbitAngle),
        0,
        -Math.cos(orbitAngle)
      );
      const right = new THREE.Vector3(
        Math.cos(orbitAngle),
        0,
        -Math.sin(orbitAngle)
      );
      const move = new THREE.Vector3();
      if (keys['KeyW'] || keys['ArrowUp']) move.add(forward);
      if (keys['KeyS'] || keys['ArrowDown']) move.sub(forward);
      if (keys['KeyA'] || keys['ArrowLeft']) move.sub(right);
      if (keys['KeyD'] || keys['ArrowRight']) move.add(right);

      const isMoving = move.lengthSq() > 0;
      setMovingAnimation(isMoving);

      if (isMoving) {
        move.normalize().multiplyScalar(speed);
        player.position.add(move);
        const face = Math.atan2(move.x, move.z);
        player.rotation.y = face;
      }

      const limit = 120;
      player.position.x = THREE.MathUtils.clamp(player.position.x, -limit, limit);
      player.position.z = THREE.MathUtils.clamp(player.position.z, -limit, limit);
    }

    function createSky() {
      const skyGeo = new THREE.SphereGeometry(400, 32, 24);
      const skyMat = new THREE.ShaderMaterial({
        uniforms: {
          topColor: { value: new THREE.Color(0x5BA3D9) },
          bottomColor: { value: new THREE.Color(0xD4EEFF) },
        },
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPos.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 topColor;
          uniform vec3 bottomColor;
          varying vec3 vWorldPosition;
          void main() {
            float h = normalize(vWorldPosition).y;
            float t = smoothstep(-0.05, 0.6, h);
            gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
          }
        `,
        side: THREE.BackSide,
        depthWrite: false,
      });
      scene.add(new THREE.Mesh(skyGeo, skyMat));
    }

    function createGround() {
      const groundGeo = new THREE.PlaneGeometry(300, 300);
      const groundMat = new THREE.MeshLambertMaterial({ color: 0x7EC850 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);
    }

    function createHills() {
      const hillColor = new THREE.Color(0x6BBF47);

      const clusters = [
        { x: 0, z: -60, count: 4 },
        { x: 40, z: -50, count: 3 },
        { x: -40, z: -50, count: 3 },
        { x: 65, z: -30, count: 3 },
        { x: -65, z: -30, count: 3 },
        { x: 55, z: -55, count: 2 },
        { x: -55, z: -55, count: 2 },
        { x: 80, z: -10, count: 2 },
        { x: -80, z: -10, count: 2 },
        { x: 30, z: -70, count: 2 },
        { x: -30, z: -70, count: 2 },
      ];

      const seededRandom = (seed) => {
        let s = seed;
        return () => {
          s = (s * 16807 + 0) % 2147483647;
          return s / 2147483647;
        };
      };
      const rand = seededRandom(42);

      for (const cluster of clusters) {
        for (let i = 0; i < cluster.count; i++) {
          const radius = 10 + rand() * 15;
          const geo = new THREE.SphereGeometry(radius, 24, 16);

          const color = hillColor.clone();
          color.offsetHSL(0, (rand() - 0.5) * 0.05, (rand() - 0.5) * 0.08);
          const mat = new THREE.MeshLambertMaterial({ color });

          const hill = new THREE.Mesh(geo, mat);
          hill.scale.y = 0.35 + rand() * 0.25;

          const offsetX = (rand() - 0.5) * 15;
          const offsetZ = (rand() - 0.5) * 10;
          hill.position.set(
            cluster.x + offsetX,
            -(radius * hill.scale.y * 0.3),
            cluster.z + offsetZ
          );

          hill.receiveShadow = true;
          scene.add(hill);
        }
      }
    }

    function createTrees() {
      const trunkGeo = new THREE.CylinderGeometry(0.15, 0.25, 2, 8);
      const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6B4226 });
      const canopyGeo = new THREE.SphereGeometry(1, 8, 6);
      const canopyMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });

      const seededRandom = (seed) => {
        let s = seed;
        return () => {
          s = (s * 16807 + 0) % 2147483647;
          return s / 2147483647;
        };
      };
      const rand = seededRandom(123);

      const treePositions = [];
      const treeCount = 30;
      let attempts = 0;

      while (treePositions.length < treeCount && attempts < 500) {
        attempts++;
        const angle = rand() * Math.PI * 2;
        const dist = 8 + rand() * 45;
        const x = Math.cos(angle) * dist;
        const z = Math.sin(angle) * dist;

        const tooClose = treePositions.some(
          (p) => Math.hypot(p.x - x, p.z - z) < 3
        );
        if (tooClose) continue;
        if (z < -40) continue;

        treePositions.push({ x, z });

        const tree = new THREE.Group();

        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = 1;
        trunk.castShadow = true;
        tree.add(trunk);

        const canopy = new THREE.Mesh(canopyGeo, canopyMat.clone());
        canopy.material.color.offsetHSL(0, (rand() - 0.5) * 0.1, (rand() - 0.5) * 0.1);
        canopy.position.y = 2.5;
        canopy.castShadow = true;
        tree.add(canopy);

        const scale = 0.7 + rand() * 0.8;
        tree.scale.set(scale, scale, scale);
        tree.position.set(x, 0, z);
        tree.rotation.y = rand() * Math.PI * 2;

        scene.add(tree);
      }
    }

    function setupLighting() {
      const ambient = new THREE.AmbientLight(0xB0E0FF, 0.8);
      scene.add(ambient);

      const hemi = new THREE.HemisphereLight(0x87CEEB, 0x7EC850, 0.5);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xFFFDD0, 1.4);
      sun.position.set(30, 50, 20);
      sun.castShadow = true;
      sun.shadow.mapSize.width = 2048;
      sun.shadow.mapSize.height = 2048;
      sun.shadow.camera.left = -60;
      sun.shadow.camera.right = 60;
      sun.shadow.camera.top = 60;
      sun.shadow.camera.bottom = -60;
      sun.shadow.camera.near = 0.5;
      sun.shadow.camera.far = 150;
      sun.shadow.bias = -0.001;
      scene.add(sun);

      // Procedural environment map for reflections on metallic/glossy objects
      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      const envScene = new THREE.Scene();
      // Sky gradient
      const envGeo = new THREE.SphereGeometry(100, 16, 8);
      const envMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        uniforms: {
          topColor: { value: new THREE.Color(0x88CCEE) },
          bottomColor: { value: new THREE.Color(0xAADD88) },
        },
        vertexShader: `varying vec3 vWorldPos;
          void main(){vWorldPos=(modelMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
        fragmentShader: `uniform vec3 topColor;uniform vec3 bottomColor;varying vec3 vWorldPos;
          void main(){float h=normalize(vWorldPos).y;gl_FragColor=vec4(mix(bottomColor,topColor,smoothstep(-0.1,0.5,h)),1.0);}`,
      });
      envScene.add(new THREE.Mesh(envGeo, envMat));
      // Bright sun spot
      const sunLight = new THREE.DirectionalLight(0xFFFFDD, 2);
      sunLight.position.set(30, 50, 20);
      envScene.add(sunLight);
      envScene.add(new THREE.AmbientLight(0xCCDDEE, 1));
      const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
      scene.environment = envMap;
      pmremGenerator.dispose();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.1);
      updatePlayer(delta);
      updateCamera();
      if (animationMixer) animationMixer.update(delta);
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
